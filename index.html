<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ Chat — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d0f;
  --surface:#16161a;
  --surface2:#1e1e24;
  --surface3:#26262e;
  --border:#2a2a35;
  --border2:#35353f;
  --text:#e8e8f0;
  --text2:#9898aa;
  --text3:#5a5a6e;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --accent-glow:rgba(124,106,247,0.18);
  --green:#34d399;
  --red:#f87171;
  --user-bubble:#1e1b4b;
  --user-border:#3730a3;
  --radius:14px;
  --font:'Sora',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 70% 20%, rgba(124,106,247,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 80%, rgba(192,132,252,0.04) 0%, transparent 50%);
}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:260px;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:10;
  transition:transform .3s cubic-bezier(.23,1,.32,1);
}
.sidebar-top{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:.7rem;margin-bottom:1.2rem;}
.brand-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#c084fc);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;color:#fff;font-weight:700;
  box-shadow:0 0 20px var(--accent-glow);
}
.brand-name{font-size:1rem;font-weight:700;letter-spacing:-.02em;}
.brand-tag{font-size:.6rem;color:var(--text3);font-weight:500;letter-spacing:.08em;text-transform:uppercase;}

.new-chat-btn{
  width:100%;padding:.7rem 1rem;
  background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
  color:var(--text);font-family:var(--font);font-size:.82rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:.6rem;transition:all .2s;
}
.new-chat-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent2);}

.sidebar-history{flex:1;overflow-y:auto;padding:.8rem;}
.sidebar-history::-webkit-scrollbar{width:3px;}
.sidebar-history::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.hist-label{font-size:.6rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:.3rem .4rem .6rem;}
.hist-item{
  padding:.55rem .8rem;border-radius:8px;font-size:.78rem;color:var(--text2);
  cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  transition:all .18s;margin-bottom:.15rem;
}
.hist-item:hover{background:var(--surface2);color:var(--text);}
.hist-item.active{background:rgba(124,106,247,0.15);color:var(--accent2);border:1px solid rgba(124,106,247,.25);}

.sidebar-bottom{padding:1rem;border-top:1px solid var(--border);}
.model-badge{
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem .9rem;border-radius:9px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:.7rem;color:var(--text2);line-height:1.4;
}
.model-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5);}50%{box-shadow:0 0 0 5px rgba(52,211,153,0);}}

/* ── MAIN ── */
.main{margin-left:260px;display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* ── TOPBAR ── */
.topbar{
  padding:1rem 1.8rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,13,15,.85);backdrop-filter:blur(16px);flex-shrink:0;
}
.topbar-title{font-size:.92rem;font-weight:600;}
.topbar-sub{font-size:.65rem;color:var(--text3);margin-top:.15rem;}
.lang-pill{
  padding:.35rem 1rem;border-radius:99px;
  background:var(--surface2);border:1px solid var(--border2);
  font-size:.68rem;font-weight:600;color:var(--text2);
  font-family:var(--mono);letter-spacing:.04em;transition:all .35s;
}
.lang-pill.detected{border-color:var(--accent);color:var(--accent2);background:rgba(124,106,247,0.12);}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:2rem 0;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

.msg-wrap{max-width:760px;margin:0 auto;padding:0 1.8rem;}

/* Welcome */
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:65vh;text-align:center;padding:2rem;
}
.welcome-orb{
  width:76px;height:76px;border-radius:22px;
  background:linear-gradient(135deg,var(--accent),#c084fc,#818cf8);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin-bottom:1.8rem;
  box-shadow:0 0 40px rgba(124,106,247,0.3),0 0 80px rgba(124,106,247,0.1);
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.welcome h1{font-size:1.9rem;font-weight:700;letter-spacing:-.04em;margin-bottom:.7rem;line-height:1.2;}
.welcome h1 span{background:linear-gradient(90deg,var(--accent),#c084fc,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.welcome p{font-size:.88rem;color:var(--text2);line-height:1.75;max-width:400px;margin-bottom:2rem;}

.suggestion-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;width:100%;max-width:500px;}
.suggestion{
  padding:.85rem 1rem;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  font-size:.76rem;color:var(--text2);text-align:left;cursor:pointer;
  transition:all .2s;line-height:1.55;
}
.suggestion:hover{background:var(--surface2);border-color:var(--accent);color:var(--text);}
.suggestion strong{display:block;color:var(--text);font-size:.8rem;margin-bottom:.2rem;}

/* Messages */
.message{display:flex;gap:.9rem;margin-bottom:1.8rem;animation:msgIn .3s cubic-bezier(.23,1,.32,1) both;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.msg-avatar{
  width:32px;height:32px;border-radius:9px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;
}
.msg-avatar.ai{
  background:linear-gradient(135deg,var(--accent),#c084fc);
  box-shadow:0 0 12px var(--accent-glow);
  color:#fff;font-size:.75rem;font-weight:700;
}
.msg-avatar.user{background:var(--user-bubble);border:1px solid var(--user-border);}

.msg-body{flex:1;min-width:0;}
.msg-name{
  font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:var(--text3);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;
}
.lang-tag{
  font-size:.56rem;padding:.1rem .42rem;border-radius:4px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text3);font-family:var(--mono);text-transform:uppercase;font-weight:500;
}

.msg-content{font-size:.9rem;line-height:1.82;color:var(--text);}
.msg-content p{margin-bottom:.6rem;}
.msg-content p:last-child{margin-bottom:0;}
.msg-content strong{color:#fff;font-weight:600;}
.msg-content em{color:var(--accent2);font-style:italic;}
.msg-content code{
  font-family:var(--mono);font-size:.78rem;
  background:var(--surface2);border:1px solid var(--border2);
  padding:.12rem .42rem;border-radius:5px;color:#c084fc;
}
.msg-content pre{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:1.1rem 1.3rem;margin:.7rem 0;overflow-x:auto;
}
.msg-content pre code{background:none;border:none;padding:0;color:#a5f3fc;font-size:.78rem;line-height:1.65;}
.msg-content ul,.msg-content ol{padding-left:1.4rem;margin:.5rem 0;}
.msg-content li{margin-bottom:.35rem;}
.msg-content h1,.msg-content h2,.msg-content h3{color:#fff;font-weight:600;margin:.9rem 0 .45rem;}
.msg-content h1{font-size:1.1rem;}
.msg-content h2{font-size:1rem;}
.msg-content h3{font-size:.92rem;}
.msg-content blockquote{
  border-left:3px solid var(--accent);padding:.6rem 1rem;margin:.6rem 0;
  color:var(--text2);background:var(--surface2);border-radius:0 8px 8px 0;
}
.msg-content a{color:var(--accent2);text-decoration:underline;text-underline-offset:3px;}
.msg-content hr{border:none;border-top:1px solid var(--border2);margin:.9rem 0;}
.msg-content table{width:100%;border-collapse:collapse;margin:.7rem 0;font-size:.82rem;}
.msg-content th{background:var(--surface2);padding:.5rem .8rem;text-align:left;color:var(--text);border:1px solid var(--border2);}
.msg-content td{padding:.5rem .8rem;border:1px solid var(--border);color:var(--text2);}
.msg-content tr:hover td{background:rgba(255,255,255,.02);}

.user-msg .msg-content{
  background:var(--user-bubble);border:1px solid var(--user-border);
  border-radius:var(--radius) var(--radius) 4px var(--radius);
  padding:.85rem 1.1rem;display:inline-block;max-width:100%;
}

/* Typing dots */
.typing-dots{display:flex;gap:5px;align-items:center;padding:.5rem 0;}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.35;
  animation:dot-bounce .85s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.16s;}
.typing-dots span:nth-child(3){animation-delay:.32s;}
@keyframes dot-bounce{0%,80%,100%{transform:translateY(0);opacity:.35;}40%{transform:translateY(-7px);opacity:1;}}

/* Streaming cursor */
.streaming-cursor::after{
  content:'▋';color:var(--accent);animation:blink .7s infinite;margin-left:1px;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── INPUT ── */
.input-area{
  padding:1.2rem 1.8rem 1.5rem;border-top:1px solid var(--border);
  background:rgba(13,13,15,.92);backdrop-filter:blur(20px);flex-shrink:0;
}
.input-wrap{max-width:760px;margin:0 auto;}
.input-box{
  display:flex;align-items:flex-end;gap:.8rem;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:.75rem .75rem .75rem 1.2rem;
  transition:border-color .25s,box-shadow .25s;
}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,247,0.12);}
#userInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:.88rem;
  resize:none;max-height:160px;line-height:1.65;padding:.28rem 0;
}
#userInput::placeholder{color:var(--text3);}
.send-btn{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 0 16px rgba(124,106,247,0.25);
}
.send-btn:hover{transform:scale(1.07);box-shadow:0 0 24px rgba(124,106,247,0.4);}
.send-btn:disabled{opacity:.3;transform:none;cursor:not-allowed;box-shadow:none;}
.send-btn svg{color:#fff;}

.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.55rem;padding:0 .2rem;}
.input-hint{font-size:.62rem;color:var(--text3);}
.input-hint kbd{
  font-family:var(--mono);font-size:.58rem;
  background:var(--surface2);border:1px solid var(--border2);
  padding:.1rem .35rem;border-radius:4px;color:var(--text2);
}
.char-count{font-size:.62rem;color:var(--text3);font-family:var(--mono);}

/* Mobile */
.sidebar-toggle{
  display:none;position:fixed;top:.9rem;left:.9rem;z-index:100;
  width:36px;height:36px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border2);
  align-items:center;justify-content:center;cursor:pointer;color:var(--text2);
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-toggle{display:flex;}
  .main{margin-left:0;}
  .suggestion-grid{grid-template-columns:1fr;}
  .msg-wrap,.input-wrap{padding:0 1rem;}
  .topbar{padding:.85rem 1rem .85rem 3.5rem;}
  .input-area{padding:1rem 1rem 1.2rem;}
}

/* Error toast */
.toast{
  position:fixed;bottom:6.5rem;left:50%;transform:translateX(-50%);
  background:#1a1a1a;border:1px solid var(--red);color:var(--red);
  padding:.65rem 1.3rem;border-radius:10px;font-size:.78rem;z-index:9999;
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
  transform:translateX(-50%) translateY(6px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div>
        <div class="brand-name">AJ Chat</div>
        <div class="brand-tag">AI Assistant</div>
      </div>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>
  </div>
  <div class="sidebar-history" id="historyList">
    <div class="hist-label">Recent</div>
  </div>
  <div class="sidebar-bottom">
    <div class="model-badge">
      <span class="model-dot"></span>
      <div><div style="font-weight:600;color:var(--text)">Claude Sonnet</div><div>Powered by Anthropic</div></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">AJ Chat</div>
      <div class="topbar-sub">Generative AI · Multi-language</div>
    </div>
    <div class="lang-pill" id="langPill">Auto-detect</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg-wrap" id="msgWrap"></div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="userInput" placeholder="Message AJ Chat... (Tamil, English, Hindi — any language)" rows="1" maxlength="4000"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
        <span class="char-count" id="charCount">0 / 4000</span>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let conversation = [];
let isTyping = false;
let sessions = [];
let activeSessionEl = null;

// ── DOM ──
const messagesEl = document.getElementById('messages');
const msgWrap    = document.getElementById('msgWrap');
const userInput  = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');
const langPill   = document.getElementById('langPill');
const charCount  = document.getElementById('charCount');
const histList   = document.getElementById('historyList');

// ── INIT WELCOME ──
showWelcome();

function showWelcome() {
  msgWrap.innerHTML = `
  <div class="welcome">
    <div class="welcome-orb">✦</div>
    <h1>Hello! I'm <span>AJ Chat</span></h1>
    <p>Ask me anything in any language — Tamil, English, Tanglish, Hindi, or any other language. I'll detect and reply in the same language.</p>
    <div class="suggestion-grid">
      <div class="suggestion" onclick="useSuggestion('Best practices for YouTube Shorts editing?')">
        <strong>🎬 Video editing tips</strong>Best practices for YouTube Shorts
      </div>
      <div class="suggestion" onclick="useSuggestion('Help me write a JavaScript fetch function with error handling')">
        <strong>💻 Code help</strong>Write a JavaScript fetch function
      </div>
      <div class="suggestion" onclick="useSuggestion('oru nalla portfolio website epdi design pannuvathu? tips sollu')">
        <strong>🌐 Tamil la kelu</strong>Portfolio website tips sollu
      </div>
      <div class="suggestion" onclick="useSuggestion('Give me 10 creative social media content ideas for a freelance video editor')">
        <strong>✍️ Content ideas</strong>Ideas for freelancer social media
      </div>
    </div>
  </div>`;
}

function useSuggestion(text) {
  userInput.value = text;
  userInput.dispatchEvent(new Event('input'));
  handleSend();
}

// ── TEXTAREA ──
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  const len = userInput.value.length;
  charCount.textContent = `${len} / 4000`;
  sendBtn.disabled = len === 0 || isTyping;
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) handleSend(); }
});
sendBtn.addEventListener('click', handleSend);

// ── LANGUAGE DETECT ──
function detectLanguage(text) {
  if (/[\u0B80-\u0BFF]/.test(text)) return { code:'TA', label:'தமிழ்', name:'Tamil' };
  if (/[\u0900-\u097F]/.test(text)) return { code:'HI', label:'हिंदी', name:'Hindi' };
  if (/[\u0600-\u06FF]/.test(text)) return { code:'AR', label:'عربي', name:'Arabic' };
  if (/[\u3040-\u30FF\u4E00-\u9FAF]/.test(text)) return { code:'JA', label:'日本語', name:'Japanese' };
  if (/[\uAC00-\uD7AF]/.test(text)) return { code:'KO', label:'한국어', name:'Korean' };
  // Tanglish detection
  if (/\b(naan|ungaluku|sollu|pannunga|vanakkam|epdi|romba|theriyum|seri|andha|ithula|apdi|keela|venam|iruku|illai|panni|maari|enna|yenna|ingaye|athuku|avanga|neenga|konjam|paaru|kelu|mudiyuma|solla|varuma|aaguma|thevai)\b/i.test(text))
    return { code:'TA-EN', label:'Tanglish', name:'Tanglish' };
  return { code:'EN', label:'English', name:'English' };
}

function updateLangPill(lang) {
  langPill.textContent = lang.label;
  langPill.className = 'lang-pill detected';
  setTimeout(() => langPill.classList.remove('detected'), 2500);
}

// ── SYSTEM PROMPT ──
function buildSystem(lang) {
  return `You are AJ Chat — a smart, friendly AI assistant like ChatGPT and Gemini, embedded in a portfolio site for Ajay Visuals (video editor & web developer from Tamil Nadu, India).

CRITICAL LANGUAGE RULE:
- ALWAYS respond in the EXACT same language the user writes in
- Tamil Unicode (தமிழ்) → respond fully in Tamil
- Tanglish (Tamil written in English letters: "naan", "sollu", "enna pannunga") → respond in Tanglish with the same casual style
- Hindi → respond in Hindi
- English → respond in English
- NEVER switch languages unless the user switches first
- If mixed (code-switching), match their exact mix

PERSONALITY:
- Warm, direct, natural — like a knowledgeable friend
- Tanglish: casual tone, can use "da", "pa", "bro" if user uses them
- English: professional yet friendly
- Never say you're an AI assistant made by Anthropic — just say you're AJ Chat

FORMATTING:
- Use markdown (bold, code blocks, lists, headers) when it genuinely helps
- Keep responses focused — don't over-explain unless asked
- For casual chat: short, natural replies
- For technical questions: structured, clear answers

Current user language: ${lang.name} (${lang.code})`;
}

// ── MARKDOWN RENDER ──
function renderMd(text) {
  // Escape HTML first (except in code blocks)
  const blocks = [];
  text = text.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = blocks.length;
    blocks.push(`<pre><code class="lang-${lang}">${escHtml(code.trim())}</code></pre>`);
    return `\x00BLOCK${i}\x00`;
  });

  text = escHtml(text);
  text = text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Lists
  text = text.replace(/((?:^(?:[*\-]|\d+\.) .+$\n?)+)/gm, match => {
    const isOrdered = /^\d+\./.test(match.trim());
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^(?:[*\-]|\d+\.) /, '')}</li>`).join('');
    return isOrdered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
  });

  // Paragraphs
  text = text.split(/\n\n+/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[123]|ul|ol|pre|blockquote|hr)/.test(p)) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).join('');

  // Restore code blocks
  text = text.replace(/\x00BLOCK(\d+)\x00/g, (_, i) => blocks[i]);
  return text;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER MESSAGE ──
function addMessage(role, content, lang) {
  const div = document.createElement('div');
  div.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
  const isUser = role === 'user';
  const langTag = (lang && lang.code !== 'EN') ? `<span class="lang-tag">${lang.label}</span>` : '';
  div.innerHTML = `
    <div class="msg-avatar ${isUser ? 'user' : 'ai'}">
      ${isUser
        ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`
        : '✦'}
    </div>
    <div class="msg-body">
      <div class="msg-name">${isUser ? 'You' : 'AJ Chat'}${langTag ? ' ' + langTag : ''}</div>
      <div class="msg-content">${isUser ? `<span>${escHtml(content)}</span>` : ''}</div>
    </div>`;
  msgWrap.appendChild(div);
  scrollBottom();
  return div.querySelector('.msg-content');
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'message ai-msg'; div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar ai">✦</div>
    <div class="msg-body">
      <div class="msg-name">AJ Chat</div>
      <div class="msg-content"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  msgWrap.appendChild(div);
  scrollBottom();
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function scrollBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

// ── TOAST ──
function showToast(msg, duration = 4000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── SIDEBAR SESSION ──
function addSession(title) {
  // Remove active from others
  document.querySelectorAll('.hist-item').forEach(i => i.classList.remove('active'));
  const item = document.createElement('div');
  item.className = 'hist-item active';
  item.textContent = title.slice(0, 38) + (title.length > 38 ? '…' : '');
  item.title = title;
  // Insert after label
  const label = histList.querySelector('.hist-label');
  histList.insertBefore(item, label ? label.nextSibling : histList.firstChild);
  activeSessionEl = item;
}

// ── MAIN SEND ──
async function handleSend() {
  const text = userInput.value.trim();
  if (!text || isTyping) return;

  const lang = detectLanguage(text);
  updateLangPill(lang);

  // Clear welcome
  const welcome = msgWrap.querySelector('.welcome');
  if (welcome) {
    welcome.remove();
    addSession(text); // new session in sidebar
  } else if (conversation.length === 0) {
    addSession(text);
  }

  conversation.push({ role: 'user', content: text });

  addMessage('user', text, lang);
  userInput.value = ''; userInput.style.height = 'auto';
  charCount.textContent = '0 / 4000';
  sendBtn.disabled = true; isTyping = true;

  addTyping(); scrollBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystem(lang),
        messages: conversation.slice(-30)
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data?.error?.message || data?.error || `Server error ${res.status}`);

    const reply = data.content?.map(b => b.text || '').join('') || '';
    conversation.push({ role: 'assistant', content: reply });

    removeTyping();
    const el = addMessage('assistant', reply, null);
    el.innerHTML = renderMd(reply);
    scrollBottom();

  } catch(err) {
    removeTyping();
    conversation.pop();
    showToast('⚠ ' + (err.message || 'Connection error. Is the server running?'));
  }

  isTyping = false;
  sendBtn.disabled = userInput.value.trim().length === 0;
  userInput.focus();
}

// ── NEW CHAT ──
document.getElementById('newChatBtn').addEventListener('click', () => {
  conversation = [];
  isTyping = false;
  showWelcome();
  langPill.textContent = 'Auto-detect';
  langPill.className = 'lang-pill';
  userInput.value = ''; userInput.style.height = 'auto';
  charCount.textContent = '0 / 4000';
  sendBtn.disabled = true;
  document.querySelectorAll('.hist-item').forEach(i => i.classList.remove('active'));
  userInput.focus();
});

// ── SIDEBAR TOGGLE (mobile) ──
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// Close sidebar on outside click (mobile)
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  if (window.innerWidth <= 768 && sb.classList.contains('open') && !sb.contains(e.target) && e.target.id !== 'sidebarToggle') {
    sb.classList.remove('open');
  }
});

userInput.focus();
</script>
